<!doctype html>
<html lang="ja">
<head>

<body>

      <!-- ===== 記事2 ===== -->
      <article class="blog-card" data-category="映画">

  </main>

  <!-- footer include -->
  <div id="site-footer"></div>

  <script>
    fetch("/taisho-site/header.html")
      .then(r => r.text())
      .then(html => { document.getElementById("site-header").innerHTML = html; });

    fetch("/taisho-site/footer.html")
      .then(r => r.text())
      .then(html => { document.getElementById("site-footer").innerHTML = html; });
